<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
    <title>Blocked - yawningface</title>
  </head>
  <body>
    <main class="blocked">
      <!-- Odysseus, lashed to the mast, sailing past the Sirens. The whole
           product in one picture: the man who knew he would cave, and made
           caving impossible. -->
      <div class="blocked-art" role="img"
           aria-label="Odysseus bound to the mast as his ship passes the Sirens"></div>

      <div class="blocked-body">
        <h1 class="blocked-word">
          You asked me to stop you.
        </h1>
        <p class="blocked-why">
          <span class="blocked-domain" id="domain">this site</span>
          is blocked <span id="reason">right now</span>.
        </p>
        <p class="muted" id="until"></p>

        <div class="blocked-actions">
          <button class="primary" id="keep">Keep me out</button>
          <button class="link" id="unblock">Unblock anyway</button>
        </div>
        <p class="small-text" id="unblocked-note" hidden></p>

        <div class="blocked-meta">
          <div class="meta-item">
            <span class="meta-value" id="focused">0 m</span>
            <span class="small-text">focused today</span>
          </div>
          <div class="meta-item">
            <span class="meta-value" id="attempts">1</span>
            <span class="small-text">times you came here</span>
          </div>
          <div class="meta-item">
            <span class="meta-value" id="unblocks">0</span>
            <span class="small-text">unblocks today</span>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
