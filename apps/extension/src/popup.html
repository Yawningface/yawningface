<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
    <title>yawningface</title>
  </head>
  <body>
    <main class="popup">
      <div class="state">
        <div class="state-emoji" id="emoji">😴</div>
        <div class="state-line" id="state">Nothing blocked right now.</div>
        <div class="small-text" id="detail"></div>
      </div>

      <button class="primary" id="refresh">Refresh from desktop</button>

      <div class="small-text" id="hint">
        Desktop owns your sessions and schedules. This companion redirects
        blocked pages and relays attempts and exceptions to Insights.
      </div>

      <div class="foot">
        <span class="small-text" id="today"></span>
        <button class="link" id="options">Companion details</button>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
