<!doctype html>
<html>
<head>
<style>
  @font-face {
    font-family: "Instrument Serif";
    src: url("InstrumentSerif.woff2") format("woff2");
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 150px; height: 57px; overflow: hidden; }
  body {
    background: #f2de00;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    position: relative;
  }
  /* The uninstall plate stays left of the unchanged wordmark. */
  .art {
    position: absolute;
    inset: 0;
    background-image: url("art/captura-de-pantalla-2026-07-13-104918.webp");
    background-size: auto 100%;
    background-position: left center;
    background-repeat: no-repeat;
  }
  .fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(to left, #f2de00 42%, rgba(242, 222, 0, 0) 66%);
  }
  .word {
    position: relative;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 17px;
    line-height: 1;
    text-transform: uppercase;
    color: #12120f;
  }
</style>
</head>
<body>
  <div class="art"></div>
  <div class="fade"></div>
  <div class="word">yawningface</div>
</body>
</html>
